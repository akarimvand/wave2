<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>

    <div class="box">
        <h1>✅ تغییرات با موفقیت اعمال شد!</h1>
        <p>تاریخ بروزرسانی: ۱۴۰۵/۰۴/۳۰ - ساعت: ۱۹:۳۰</p>
        <p>شامل: فرم لاگین جدید، اسلایدر، تقویم شمسی فلت‌پیکر، سیستم تخصیص کلاس</p>
        <span class="badge">نسخه نهایی v2.0</span>
    </div>
</body>
</html>
